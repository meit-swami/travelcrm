# Internal edge proxy — subpath deployment at /travelcrm (host nginx → 127.0.0.1:EDGE_PORT).

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript application/xml;

  client_max_body_size 25m;

  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  upstream web { server web:3000; }
  upstream api { server api:4000; }

  server {
    listen 80;
    server_name _;

    location /travelcrm/api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      rewrite ^/travelcrm(.*)$ $1 break;
      proxy_pass http://api;
      include /etc/nginx/proxy_params.conf;
    }
    location /travelcrm/api/ {
      limit_req zone=api burst=40 nodelay;
      rewrite ^/travelcrm(.*)$ $1 break;
      proxy_pass http://api;
      include /etc/nginx/proxy_params.conf;
    }
    location /travelcrm/webhooks/ {
      rewrite ^/travelcrm(.*)$ $1 break;
      proxy_pass http://api;
      include /etc/nginx/proxy_params.conf;
    }

    location /travelcrm/ {
      proxy_pass http://web;
      include /etc/nginx/proxy_params.conf;
    }

    location = /travelcrm {
      return 301 /travelcrm/;
    }
  }
}
