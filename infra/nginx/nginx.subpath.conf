# Internal edge proxy — subpath deployment at /travelcrm (host nginx → 127.0.0.1:EDGE_PORT).
#
# Same-origin BFF: the browser only ever calls Next route handlers under
# /travelcrm/api/* (login, session, proxy, portal-*), and Next forwards to the
# API server-side over the internal network. So ALL /travelcrm/api/* goes to the
# web (Next) upstream — NOT the API. Only external webhooks hit the API directly.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript application/xml;

  client_max_body_size 25m;

  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  upstream web { server web:3000; }
  upstream api { server api:4000; }

  server {
    listen 80;
    server_name _;

    # External webhooks (WhatsApp, Razorpay, Cashfree) hit the API directly.
    location /travelcrm/webhooks/ {
      proxy_pass http://api/webhooks/;
      include /etc/nginx/proxy_params.conf;
    }

    # Same-origin BFF login (Next route handler) — tighter rate limit on auth.
    location = /travelcrm/api/login {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://web;
      include /etc/nginx/proxy_params.conf;
    }

    # All other browser API calls are Next BFF route handlers (proxy, session…).
    location /travelcrm/api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://web;
      include /etc/nginx/proxy_params.conf;
    }

    # App pages, static assets, and everything else → Next.
    location /travelcrm/ {
      proxy_pass http://web;
      include /etc/nginx/proxy_params.conf;
    }

    location = /travelcrm {
      proxy_pass http://web;
      include /etc/nginx/proxy_params.conf;
    }
  }
}
