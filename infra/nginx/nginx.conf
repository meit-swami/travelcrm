# TravelOS AI — reverse proxy. Terminates TLS (certs mounted separately),
# routes the web app and the API, and applies basic rate limiting.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain text/css application/json application/javascript application/xml;

  client_max_body_size 25m;

  # Rate-limit zones (tighter on auth endpoints).
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

  upstream web { server web:3000; }
  upstream api { server api:4000; }

  server {
    listen 80;
    server_name _;

    # API
    location /api/v1/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://api;
      include /etc/nginx/proxy_params.conf;
    }
    location /api/ {
      limit_req zone=api burst=40 nodelay;
      proxy_pass http://api;
      include /etc/nginx/proxy_params.conf;
    }
    location /webhooks/ {
      proxy_pass http://api;
      include /etc/nginx/proxy_params.conf;
    }

    # Web app (Next.js)
    location / {
      proxy_pass http://web;
      include /etc/nginx/proxy_params.conf;
    }
  }
}
