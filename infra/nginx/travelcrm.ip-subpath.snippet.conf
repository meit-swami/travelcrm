# Host nginx snippet — proxy /travelcrm to the compose edge on localhost.
# Include inside the default_server block (IP catch-all), BEFORE `location /`.
#
#   include /etc/nginx/snippets/travelcrm-subpath.conf;

location /travelcrm/ {
    proxy_pass http://127.0.0.1:8090/travelcrm/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
}

location = /travelcrm {
    return 301 /travelcrm/;
}
