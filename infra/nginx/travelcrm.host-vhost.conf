# Host-level nginx vhost for the TravelCRM sub-domain.
#
# Place on the VPS (NOT in the compose stack), e.g.:
#   /etc/nginx/sites-available/travelcrm.conf  → symlink into sites-enabled
# Then: certbot --nginx -d travelcrm.YOURDOMAIN.com   (TLS)
#
# This proxies the sub-domain to the compose edge bound on 127.0.0.1 — the app
# never listens on the VPS main/public IP, so it cannot clash with other projects.

server {
    listen 80;
    listen [::]:80;
    server_name travelcrm.YOURDOMAIN.com;

    # Allow Let's Encrypt HTTP-01, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name travelcrm.YOURDOMAIN.com;

    # certbot fills these in:
    # ssl_certificate     /etc/letsencrypt/live/travelcrm.YOURDOMAIN.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/travelcrm.YOURDOMAIN.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        # Must match EDGE_PORT in infra/docker/.env
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
