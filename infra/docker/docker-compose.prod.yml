name: travelcrm

# Production stack for an isolated deployment under /var/www/travelcrm.
#
# SELF-CONTAINED: every service (Postgres, Redis, MinIO, API, worker, scheduler,
# web, edge) runs on the internal compose network. There is NO external database
# dependency — Postgres runs as a container with its own named volume, so the
# stack has no reliance on Supabase or any outside host. This removes the whole
# class of "can't reach the database" (P1001) failures seen with managed DBs.
#
# ISOLATION GUARANTEE: only the edge proxy publishes a port, and it binds to
# 127.0.0.1 ONLY (never the VPS main/public IP). The host's existing web server
# proxies a sub-domain (or IP sub-path) → 127.0.0.1:${EDGE_PORT}.

x-api-build: &api-build
  context: ../..
  dockerfile: infra/docker/Dockerfile.api

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    networks: [internal]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do sleep 2; done;
      mc mb --ignore-existing local/${S3_BUCKET};
      exit 0;"
    networks: [internal]

  # Runs DB migrations + roles + seed + RLS once, then exits.
  # Order matters: seed BEFORE applying RLS, so seed inserts (system roles with
  # NULL tenant_id, etc.) can't be blocked by tenant policies regardless of the
  # connecting role's BYPASSRLS attribute.
  migrate:
    build: *api-build
    env_file: [.env]
    command: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && node prisma/apply-roles.mjs && node dist/prisma/seed.js && node prisma/apply-rls.mjs"]
    restart: "no"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]

  api:
    build: *api-build
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      migrate: { condition: service_completed_successfully }
    networks: [internal]

  worker:
    build: *api-build
    restart: unless-stopped
    env_file: [.env]
    command: ["node", "dist/src/worker.js"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      migrate: { condition: service_completed_successfully }
    networks: [internal]

  # Single scheduler instance (cron: reminders, quotation expiry, travel reminders).
  scheduler:
    build: *api-build
    restart: unless-stopped
    env_file: [.env]
    environment:
      RUN_SCHEDULER: "true"
    command: ["node", "dist/src/scheduler.js"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
      migrate: { condition: service_completed_successfully }
    networks: [internal]

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        # Set BASE_PATH=/travelcrm to serve under a sub-path (must match nginx).
        NEXT_PUBLIC_BASE_PATH: ${BASE_PATH:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_PATH: ${BASE_PATH:-}
      # The browser talks to the Next origin only (no API URL exposed). Next's
      # route handlers proxy to the API service over the internal network.
      API_BASE_URL: http://api:4000
      # COOKIE_SECURE=false ONLY for HTTP testing — use HTTPS in production.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    depends_on: [api]
    networks: [internal]

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [web]
    # Bind to localhost ONLY — never the public/main IP.
    ports:
      - "127.0.0.1:${EDGE_PORT:-8090}:80"
    volumes:
      - ${NGINX_CONF:-../nginx/nginx.subpath.conf}:/etc/nginx/nginx.conf:ro
      - ../nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
