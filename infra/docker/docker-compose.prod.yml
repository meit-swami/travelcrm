name: travelcrm

# Production stack for an isolated deployment under /var/www/travelcrm.
#
# ISOLATION GUARANTEE: only the edge proxy publishes a port, and it binds to
# 127.0.0.1 ONLY (never the VPS main/public IP). Postgres, Redis, MinIO, the
# API, worker and web are reachable solely on the internal compose network.
# The host's existing web server proxies a sub-domain → 127.0.0.1:${EDGE_PORT}.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    networks: [internal]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do sleep 2; done;
      mc mb --ignore-existing local/${S3_BUCKET};
      exit 0;"
    networks: [internal]

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]

  # Runs DB migrations + RLS + seed once, then exits.
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
    command: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && node prisma/apply-rls.mjs && node dist/prisma/seed.js"]
    restart: "no"
    networks: [internal]

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: [.env]
    command: ["node", "dist/src/worker.js"]
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL}
      API_BASE_URL: http://api:4000
    depends_on: [api]
    networks: [internal]

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [api, web]
    # Bind to localhost ONLY — never the public/main IP.
    ports:
      - "127.0.0.1:${EDGE_PORT:-8080}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
