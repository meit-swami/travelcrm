name: travelcrm

# Production stack for an isolated deployment under /var/www/travelcrm.
#
# ISOLATION GUARANTEE: only the edge proxy publishes a port, and it binds to
# 127.0.0.1 ONLY (never the VPS main/public IP). Postgres, Redis, MinIO, the
# API, worker and web are reachable solely on the internal compose network.
# The host's existing web server proxies a sub-domain → 127.0.0.1:${EDGE_PORT}.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "127.0.0.1:9000:9000"
    networks: [internal]

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do sleep 2; done;
      mc mb --ignore-existing local/${S3_BUCKET};
      exit 0;"
    networks: [internal]

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: [.env]
    network_mode: host
    depends_on:
      redis: { condition: service_started }

  # Runs DB migrations + RLS + seed once, then exits.
  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file: [.env]
    command: ["sh", "-c", "node node_modules/prisma/build/index.js migrate deploy && node prisma/apply-rls.mjs && node prisma/apply-roles.mjs && node dist/prisma/seed.js"]
    restart: "no"
    network_mode: host

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: [.env]
    command: ["node", "dist/src/worker.js"]
    network_mode: host
    depends_on:
      redis: { condition: service_started }

  # Single scheduler instance (cron: reminders, quotation expiry, travel reminders).
  scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file: [.env]
    environment:
      RUN_SCHEDULER: "true"
    command: ["node", "dist/src/scheduler.js"]
    network_mode: host
    depends_on:
      redis: { condition: service_started }

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        # Set BASE_PATH=/travelcrm to serve under a sub-path (must match nginx).
        NEXT_PUBLIC_BASE_PATH: ${BASE_PATH:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_PATH: ${BASE_PATH:-}
      API_BASE_URL: http://host.docker.internal:4000
      # The browser talks to the Next origin only (no API URL needed). Set
      # COOKIE_SECURE=false ONLY for HTTP testing — use HTTPS in production.
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on: [redis]
    networks: [internal]

  edge:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [web]
    # Bind to localhost ONLY — never the public/main IP.
    ports:
      - "127.0.0.1:${EDGE_PORT:-8080}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${NGINX_CONF:-../nginx/nginx.subpath.conf}:/etc/nginx/nginx.conf:ro
      - ../nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
    networks: [internal]

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:
